<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Los Simpsons</title>

    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <header class="bg-warning py-4">
      <div class="container">
        <h1 class="text-center mb-4 text-uppercase">Los Simpsons</h1>
      </div>
    </header>

    <main class="container my-5">
      <section class="mb-4">
        <div class="row justify-content-center mb-4">
          <div class="col-md-6 col-lg-6">
            <input
              type="text"
              name="buscador"
              id="buscador"
              placeholder="Buscar personaje..."
            />
            <button type="submit" class="btn btn-warning">Buscar</button>
          </div>
        </div>
      </section>

      <section>
        <div id="contenedorPersonajes" class="row g-4"></div>
      </section>
    </main>

    <footer class="bg-warning text-white text-center py-3 mt-5">
      <div class="container text-center">
        <p class="mb-0">&copy; Todos los derechos reservados. 2026</p>
      </div>
    </footer>
    <script src="assets/js/app.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
